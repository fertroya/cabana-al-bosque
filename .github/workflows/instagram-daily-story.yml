name: Instagram story diaria

on:
  schedule:
    # 10:00 Argentina (UTC-3) = 13:00 UTC
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-story:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: instagram/package-lock.json

      - name: Instalar dependencias
        run: |
          cd instagram
          npm ci
          npx playwright install chromium

      - name: Sincronizar pool y generar story
        env:
          OLLAMA_DISABLED: "1"
        run: |
          cd instagram
          npm run sync-pool
          npm run daily-story -- --no-publish

      - name: Subir imagen a GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add instagram/story-pool.json instagram/export/daily/*.png instagram/export/daily/*.json instagram/export/published-stories.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Instagram: story diaria $(date +%Y-%m-%d)"
          git push

      - name: Publicar en Instagram
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_API_BASE: instagram
          PUBLIC_BASE_URL: https://fertroya.github.io/cabana-al-bosque/instagram/export
          GITHUB_ACTIONS: "true"
        run: |
          cd instagram
          npm run daily-story:publish

      - name: Guardar log de publicación
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add instagram/export/published-stories.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Instagram: log story $(date +%Y-%m-%d)"
          git push
